name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QPM
        run: |
          wget -O qpm https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.8/qpm-linux-x86_64
          chmod +x qpm
          sudo mv qpm /usr/local/bin/qpm

      - name: Install Ninja & CMake
        run: sudo apt-get install -y ninja-build cmake

      - name: QPM Restore
        run: qpm restore

      - name: Setup NDK
        run: qpm ndk resolve -d

      - name: Build
        run: |
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=RelWithDebInfo -B build
          cmake --build ./build

      - name: Upload mod
        uses: actions/upload-artifact@v4
        with:
          name: BaboonModMenu
          path: build/*.so
