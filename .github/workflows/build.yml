name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QPM
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/QuestPackageManager/QPM.CLI/releases/tags/v1.5.8 | python3 -c "import sys,json; data=json.load(sys.stdin); urls=[a['browser_download_url'] for a in data['assets'] if 'linux' in a['name'].lower()]; print(urls[0])")
          curl -L "$DOWNLOAD_URL" -o qpm.zip
          unzip qpm.zip -d qpm_extracted
          chmod +x qpm_extracted/qpm
          sudo mv qpm_extracted/qpm /usr/local/bin/qpm

      - name: Install Ninja & CMake
        run: sudo apt-get install -y ninja-build cmake

      - name: Setup NDK and Restore
        run: |
          qpm ndk download 26
          NDK_PATH=$(find $HOME/.local/share/QPM-RS/ndk -maxdepth 1 -type d -name "26*" | head -1)
          echo "NDK at: $NDK_PATH"
          qpm config ndk-path "$NDK_PATH"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          qpm restore

      - name: Build
        run: |
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=RelWithDebInfo -B build
          cmake --build ./build

      - name: Upload mod
        uses: actions/upload-artifact@v4
        with:
          name: BaboonModMenu
          path: build/*.so
